name: Metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.MATRICS_TOKEN }}
          user: subhendu345
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Kolkata
